{{- if .Values.controller.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "node-doctor.controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-doctor.controller.labels" . | nindent 4 }}
  {{- with .Values.controller.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-doctor.controller.serviceAccountName" . }}
  labels:
    {{- include "node-doctor.controller.labels" . | nindent 4 }}
rules:
  # Read nodes to correlate reports with node information
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Create events for cluster-level issues
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # Read namespaces for event creation
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
  # Read controller configmap
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
    resourceNames:
      - {{ include "node-doctor.controller.name" . }}-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "node-doctor.controller.serviceAccountName" . }}
  labels:
    {{- include "node-doctor.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "node-doctor.controller.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "node-doctor.controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
