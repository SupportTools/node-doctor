{{- if .Values.controller.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "node-doctor.controller.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-doctor.controller.labels" . | nindent 4 }}
  {{- with .Values.controller.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controller.service.type }}
  ports:
    - name: http
      port: {{ .Values.controller.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "node-doctor.controller.selectorLabels" . | nindent 4 }}
{{- end }}
